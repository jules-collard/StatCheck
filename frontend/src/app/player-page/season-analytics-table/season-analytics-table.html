<table class="table table-auto">
    <thead>
        <tr>
            <th>Season</th>
            <th>Team</th>
            <th>GAx</th>
            <th>dFSh%</th>
        </tr>
    </thead>
    <tbody>
        @for (season of seasonTotals(); track $index) {
            @if (season.season >= 20142015) {
                <tr class="hover:bg-primary-content">
                    <th>{{season.season | season}}</th>
                    <th>{{season.team.triCode}}</th>
                    <td>{{season.xgGoals - season.xg | number: '0.1-1'}}</td>
                    <td>{{(season.xgGoals - season.xg) / season.fenwick | number: '0.3-3'}}</td>
                </tr>
            }
        }
    </tbody>
</table>
