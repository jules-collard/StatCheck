<div class="flex flex-row basis-auto gap-2">
    <div class="basis-auto min-w-45 max-w-70">
        <app-player-details/>
    </div>
    <div class="basis-auto min-w-100">
        <div class="flex flex-col gap-2">
            <h2 class="text-xl text-accent-content ml-2">Regular Season</h2>
            <div class="overflow-x-auto rounded-box shadow-md">
                @if (loading()) {
                    <div class="skeleton h-50 w-200"></div>
                } @else if (regSeasonTotals() == null ) {
                    <div class="badge badge-error">Seasons Not Found</div>
                } @else if (playerData()!.position === 'G'){
                    <app-goalie-totals-table [seasonTotals]="$any(regSeasonTotals()!)" [awards]="regSeasonAwards()"/>
                } @else {
                    <app-season-totals-table [seasonTotals]="$any(regSeasonTotals()!)" [awards]="regSeasonAwards()"/>
                }
            </div>
            <h2 class="text-xl text-accent-content ml-2">Playoffs</h2>
            <div class="overflow-x-auto rounded-box shadow-md">
                @if (loading()) {
                    <div class="skeleton h-50 w-200"></div>
                } @else if (postSeasonTotals() == null ) {
                    <div class="badge badge-error">Seasons Not Found</div>
                } @else if (playerData()!.position === 'G'){
                    <app-goalie-totals-table [seasonTotals]="$any(postSeasonTotals()!)" [awards]="postSeasonAwards()"/>
                } @else {
                    <app-season-totals-table [seasonTotals]="$any(postSeasonTotals()!)" [awards]="postSeasonAwards()"/>
                }
            </div>
        </div>
    </div>
</div>
