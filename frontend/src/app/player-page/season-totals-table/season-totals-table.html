<table class="table table-auto">
    <thead>
        <tr>
            <th>Season</th>
            <th>Team</th>
            <th>GP</th>
            <th>TOI</th>
            <th>G</th>
            <th>A</th>
            <th>Pts</th>
            <th>+/-</th>
            <th>SOG</th>
            <th>Hits</th>
            <th>Blocks</th>
            <th>PIM</th>
            <th>Awards</th>
        </tr>
    </thead>
    <tbody>
        @for (season of seasonStats(); track $index) {
            <tr class="hover:bg-primary-content">
                <th>{{season.season | season}}</th>
                <th>{{season.teamTriCode}}</th>
                <td [innerHTML]="season.totals.gamesPlayed | boldRecord: season.totals.records?.maxGamesPlayed"></td>
                <td>{{season.totals.avgTOI | timeOnIce}}</td>
                <td [innerHTML]="season.totals.goals | boldRecord: season.totals.records?.maxGoals"></td>
                <td [innerHTML]="season.totals.assists | boldRecord: season.totals.records?.maxAssists"></td>
                <td [innerHTML]="season.totals.goals + season.totals.assists | boldRecord: season.totals.records?.maxPoints"></td>
                <td [innerHTML]="season.totals.plusMinus | boldRecord: season.totals.records?.maxPlusMinus"></td>
                <td [innerHTML]="season.totals.sog | boldRecord: season.totals.records?.maxShotsOnGoal"></td>
                <td [innerHTML]="season.totals.hits | boldRecord: season.totals.records?.maxHits"></td>
                <td [innerHTML]="season.totals.blocks | boldRecord: season.totals.records?.maxBlocks"></td>
                <td [innerHTML]="season.totals.penaltyMinutes | boldRecord: season.totals.records?.maxPenaltyMinutes"></td>
                <td>
                    @for (award of getSeasonAwards(season.season); track $index) {
                        <app-award-badge [award]="award"/>
                        <br/>
                    }
                </td>
            </tr>
        }
    </tbody>
</table>
