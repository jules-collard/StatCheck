<fieldset class="fieldset bg-base-100 border border-base-300 rounded-box w-3/4 justify-self-center p-4">
    <legend class="fieldset-legend text-xl">Filters</legend>
    <label class="label text-sm">Status</label>
    <form class="filter" (change)="onChangeActiveRetired()">
        <input class="btn btn-soft btn-secondary" type="reset" value="×" (click)="resetActiveRetired()"/>
        <input [control]="activeRetiredForm.active" class="btn btn-soft btn-secondary" type="radio" name="activeRetired" aria-label="Active"/>
        <input [control]="activeRetiredForm.retired" class="btn btn-soft btn-secondary" type="radio" name="activeRetired" aria-label="Retired"/>
    </form>
    <label class="label text-sm">Position</label>
    <form class="filter">
        <input class="btn btn-soft btn-secondary" type="reset" value="×"/>
        <input class="btn btn-soft btn-secondary" type="radio" name="positions" aria-label="G"/>
        <input class="btn btn-soft btn-secondary" type="radio" name="positions" aria-label="D"/>
        <input class="btn btn-soft btn-secondary" type="radio" name="positions" aria-label="F"/>
    </form>
    <label class="label text-sm">Team</label>
    <select class="select select-secondary">
        <option>All</option>
        @for (team of playerListService.teams(); track $index) {
            <option>{{team}}</option>
        }
    </select>
</fieldset>
