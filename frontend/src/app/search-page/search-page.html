<div class="flex-col justify-items-center gap-2">
    @if (isLoading()) {
        <span class="loading loading-spinner loading-xl"></span>
    } @else if (players() == null || players().length == 0) {
        <div class="badge badge-error">Players Not Found</div>
    } @else {
        <div class="min-w-1/3 max-h-full">
            <app-player-list [players]="players()"/>
        </div>
    }
</div>
