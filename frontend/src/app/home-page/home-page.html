<div class="grid grid-cols-2 auto-rows-[10dvh]">
    <p class="text-2xl text-center font-extrabold">Latest Scores</p>
    <div class="grid grid-cols-2 col-1 gap-2 justify-self-center">
        @if (scoresResource.hasValue()) {
            @for (game of scoresResource.value(); track game.id) {
                <app-scorebug [gameDetails]="game"/>
            }
        }
    </div>
</div>
